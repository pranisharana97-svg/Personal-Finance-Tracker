<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header Section -->
        <header class="header">
            <h1 class="title">💰 Personal Finance Tracker</h1>
            <p class="subtitle">Manage your income and expenses with ease</p>
        </header>

        <main class="main-content">
            <!-- Balance Summary Section -->
            <section class="balance-section">
                <div class="balance-card income-card">
                    <div class="balance-icon">📈</div>
                    <div class="balance-info">
                        <p class="balance-label">Total Income</p>
                        <p class="balance-amount" id="totalIncome">$0.00</p>
                    </div>
                </div>

                <div class="balance-card expense-card">
                    <div class="balance-icon">📉</div>
                    <div class="balance-info">
                        <p class="balance-label">Total Expenses</p>
                        <p class="balance-amount" id="totalExpenses">$0.00</p>
                    </div>
                </div>

                <div class="balance-card balance-card-main">
                    <div class="balance-icon">💵</div>
                    <div class="balance-info">
                        <p class="balance-label">Current Balance</p>
                        <p class="balance-amount" id="currentBalance">$0.00</p>
                    </div>
                </div>
            </section>

            <!-- Add Transaction Section -->
            <section class="transaction-form-section">
                <h2 class="section-title">Add New Transaction</h2>
                <form id="transactionForm" class="transaction-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="description">Description</label>
                            <input 
                                type="text" 
                                id="description" 
                                placeholder="e.g., Grocery shopping" 
                                required
                            >
                        </div>

                        <div class="form-group">
                            <label for="amount">Amount</label>
                            <input 
                                type="number" 
                                id="amount" 
                                placeholder="0.00" 
                                step="0.01" 
                                min="0" 
                                required
                            >
                        </div>

                        <div class="form-group">
                            <label for="category">Category</label>
                            <select id="category" required>
                                <option value="">Select a category</option>
                                <option value="Salary">Salary</option>
                                <option value="Freelance">Freelance</option>
                                <option value="Investment">Investment</option>
                                <option value="Other Income">Other Income</option>
                                <option value="Food">Food</option>
                                <option value="Transportation">Transportation</option>
                                <option value="Entertainment">Entertainment</option>
                                <option value="Utilities">Utilities</option>
                                <option value="Healthcare">Healthcare</option>
                                <option value="Shopping">Shopping</option>
                                <option value="Education">Education</option>
                                <option value="Other Expense">Other Expense</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="type">Type</label>
                            <div class="radio-group">
                                <label class="radio-label">
                                    <input type="radio" name="type" value="income" required>
                                    <span>Income</span>
                                </label>
                                <label class="radio-label">
                                    <input type="radio" name="type" value="expense" required>
                                    <span>Expense</span>
                                </label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="date">Date</label>
                            <input 
                                type="date" 
                                id="date" 
                                required
                            >
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary">Add Transaction</button>
                </form>
            </section>

            <!-- Filter Section -->
            <section class="filter-section">
                <h2 class="section-title">Transactions</h2>
                <div class="filter-controls">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="income">Income</button>
                    <button class="filter-btn" data-filter="expense">Expense</button>
                </div>
            </section>

            <!-- Transactions List Section -->
            <section class="transactions-section">
                <div id="transactionsList" class="transactions-list">
                    <!-- Transactions will be rendered here by JavaScript -->
                    <div class="empty-state">
                        <p>No transactions yet. Add one to get started! 👆</p>
                    </div>
                </div>
            </section>
        </main>

        <!-- Footer Section -->
        <footer class="footer">
            <p>&copy; 2026 Personal Finance Tracker. All rights reserved.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
